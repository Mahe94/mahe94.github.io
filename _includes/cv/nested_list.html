<ul class="cv-list cv-nested-list">
  {% for content in entry.contents %}
    <li>
      <div class="cv-entry-title">{{ content.title }}</div>
      {% if content.items %}
        <ul class="cv-subitems">
          {% for subitem in content.items %}
            <li>{{ subitem }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    </li>
  {% endfor %}
</ul>
