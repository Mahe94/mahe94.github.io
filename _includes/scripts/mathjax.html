{%- if site.enable_math -%}

<!-- MathJax -->
<script>
  window.MathJax = {
    tex: {
      tags: 'ams',
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['\\[', '\\]'], ['$$', '$$']],
      processEscapes: true,
      packages: {'[+]': ['ams']},
      macros: {
        Z: "\\mathbb{Z}",
        R: "\\mathbb{R}",
        Q: "\\mathbb{Q}",
        N: "\\mathbb{N}",
        F: "\\mathbb{F}",
        L: "\\mathcal{L}",
        basis: "\\mathbf{b}",
        norm: ["\\left\\lVert #1 \\right\\rVert", 1],
        inner: ["\\left\\langle #1, #2 \\right\\rangle", 2]
      }
    },
    options: {
      skipHtmlTags: [
        'script', 'noscript', 'style', 'textarea', 'pre', 'code'
      ]
    }
  };
</script>

<script
  defer
  id="MathJax-script"
  src="https://cdn.jsdelivr.net/npm/mathjax@{{ site.mathjax.version }}/es5/tex-mml-chtml.js">
</script>

{%- endif %}
