---
layout: page
---

<div class="paper-summary">
  <p>
    <a href="/publications/">← Back to publications</a>
  </p>

  <h1>{{ page.title }}</h1>

  {% if page.paper_authors %}
  <p><strong>Authors:</strong> {{ page.paper_authors }}</p>
  {% endif %}

  {% if page.venue %}
  <p><strong>Venue:</strong> {{ page.venue }}</p>
  {% endif %}

  <hr>

  {{ content }}
</div>
